# MediaMTX TEST — camera at 192.168.68.89
#
# This Docker file is for Linux. On Windows Plesk VPS prefer the .exe instead.
# For a quick LAN test on your own PC (same network as the camera):
#   1. Download MediaMTX Windows release
#   2. Copy mediamtx.yml next to mediamtx.exe
#   3. Put your real camera password in mediamtx.yml
#   4. Run: mediamtx.exe
#
# Docker (Linux only — host networking):
services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    network_mode: host
    environment:
      - MTX_WEBRTCADDITIONALHOSTS=127.0.0.1
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped
