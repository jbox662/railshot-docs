# MediaMTX config for RailShot TV
# Path names under `paths:` must match the `id` fields in js/streams-config.js
# Add or remove path blocks freely — there is no fixed table limit.

logLevel: info

webrtc: yes
hls: yes
rtmp: no
srt: no

# Optional: restrict publish/read later with auth
# authInternalUsers: ...

paths:
  # On-demand pull from Reolink NVR — only connects when someone is watching
  table1:
    source: rtsp://admin:password@192.168.1.50:554/h264Preview_01_main
    sourceOnDemand: yes

  table2:
    source: rtsp://admin:password@192.168.1.50:554/h264Preview_02_main
    sourceOnDemand: yes

  table3:
    source: rtsp://admin:password@192.168.1.50:554/h264Preview_03_main
    sourceOnDemand: yes

  # Example — uncomment / copy for more tables:
  # table4:
  #   source: rtsp://admin:password@192.168.1.50:554/h264Preview_04_main
  #   sourceOnDemand: yes
