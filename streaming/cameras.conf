# ═══════════════════════════════════════════════════════════════════════════
# RailShot TV — Camera Streaming Config
# Fill in your camera details below, then run: sudo bash setup-streams.sh
# ═══════════════════════════════════════════════════════════════════════════
#
# FORMAT:  TABLE_NAME | RTSP_URL | YOUTUBE_STREAM_KEY
#
# TABLE_NAME       : Short name used for the service (no spaces, e.g. table1)
# RTSP_URL         : Full RTSP URL to your Reolink camera
# YOUTUBE_STREAM_KEY : From YouTube Studio > Go Live > Stream > Stream Key
#
# ─── EXAMPLES (replace with your real values) ───────────────────────────────

table1 | rtsp://admin:YOUR_PASSWORD@192.168.68.89:554/h264Preview_01_main | xxxx-xxxx-xxxx-xxxx-xxxx

# table2 | rtsp://admin:YOUR_PASSWORD@192.168.68.90:554/h264Preview_01_main | yyyy-yyyy-yyyy-yyyy-yyyy

# table3 | rtsp://admin:YOUR_PASSWORD@192.168.68.91:554/h264Preview_01_main | zzzz-zzzz-zzzz-zzzz-zzzz

# ─── NOTES ───────────────────────────────────────────────────────────────────
# - Reolink default RTSP port is 554
# - Stream path is usually /h264Preview_01_main (main stream) or
#   /h264Preview_01_sub (sub stream, lower quality/bandwidth)
# - YouTube stream keys are found at: https://studio.youtube.com
#   Click Go Live > Stream > Stream settings > Stream key
# - Each camera needs its OWN YouTube stream key (create one per table)
# - Lines starting with # are comments and are ignored
