#
# ─── YOUR CAMERAS (replace with real values) ────────────────────────────────

table1 | rtsp://admin:YOUR_PASSWORD@192.168.68.89:554/h264Preview_01_main | xxxx-xxxx-xxxx-xxxx-xxxx

# table2 | rtsp://admin:YOUR_PASSWORD@192.168.68.90:554/h264Preview_01_main | yyyy-yyyy-yyyy-yyyy-yyyy

# table3 | rtsp://admin:YOUR_PASSWORD@192.168.68.91:554/h264Preview_01_main | zzzz-zzzz-zzzz-zzzz-zzzz

# ─── NOTES ───────────────────────────────────────────────────────────────────
# Reolink default username : admin
# Reolink default RTSP port: 554
# Main stream path         : /h264Preview_01_main
# Sub stream (lower quality): /h264Preview_01_sub
# YouTube stream keys at   : https://studio.youtube.com > Go Live > Stream
# Lines starting with # are ignored
